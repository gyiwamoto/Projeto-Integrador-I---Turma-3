<div class="page">
  <div class="card">

    <div class="logo-wrap">
      <img src="logo.png" alt="Sousa Iwamoto" class="logo" />
    </div>

    <h1 class="greeting">Olá, bem-vindo!</h1>
    <p class="subtitle">O que deseja fazer?</p>

    <div class="menu">

      <!-- Agendamento -->
      <button class="menu-item" (click)="irParaAgenda()">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <span>Agendamento</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- Agenda -->
      <button class="menu-item" (click)="toggleAgendaMenu()">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <polyline points="9 16 11 18 15 14"/>
          </svg>
        </div>
        <span>Agenda</span>
        <svg class="arrow" [class.rotated]="agendaMenuAberto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <div class="submenu" [class.aberto]="agendaMenuAberto">
        <button class="submenu-item" (click)="irParaAgendaDoutora('beatriz')">
          <div class="avatar">B</div>
          Dra. Beatriz
        </button>
        <button class="submenu-item" (click)="irParaAgendaDoutora('luciana')">
          <div class="avatar">L</div>
          Dra. Luciana
        </button>
      </div>

      <!-- Pacientes -->
      <button class="menu-item" (click)="irParaPacientes()">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <span>Pacientes</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </div>

    <p class="tagline">SORRIA,<br>TENHA UM EXCELENTE<br>DIA!</p>

  </div>
</div>
