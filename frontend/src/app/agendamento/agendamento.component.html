<div class="page">
  <div class="card">

    <div class="logo-wrap">
      <img src="logo.png" alt="Sousa Iwamoto" class="logo" />
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="field" [class.error]="cpf.invalid && cpf.touched">
        <label>CPF:</label>
        <input
          type="text"
          formControlName="cpf"
          placeholder="000.000.000-00"
          maxlength="14"
          (input)="onCpfInput($event)"
        />
        <span class="hint" *ngIf="cpf.errors?.['required'] && cpf.touched">Campo obrigatório.</span>
      </div>

      <div class="field">
        <label>Nome</label>
        <input type="text" formControlName="nome" />
      </div>

      <div class="field">
        <label>Celular</label>
        <input type="text" formControlName="celular" placeholder="(00) 00000-0000" maxlength="15" />
      </div>

      <div class="error-global" *ngIf="errorMsg()">{{ errorMsg() }}</div>

      <div class="actions">
        <button type="submit" class="btn-confirm" [disabled]="loading()">
          <span *ngIf="!loading()">confirma</span>
          <span *ngIf="loading()" class="spinner"></span>
        </button>
        <button type="button" class="btn-cancel" (click)="cancelar()">cancela</button>
      </div>

    </form>
  </div>
</div>
