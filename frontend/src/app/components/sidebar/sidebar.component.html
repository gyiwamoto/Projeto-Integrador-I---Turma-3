<aside class="sidebar" aria-label="Menu principal">
  <div class="sidebar__profile">
    <span class="sidebar__eyebrow">Área logada</span>
    <strong class="sidebar__name">{{ usuarioNome }}</strong>
  </div>

  <p class="sidebar__title">Navegação</p>

  <nav class="sidebar__nav">
    @for (item of menuItemsVisiveis; track item.label) {
    <a [routerLink]="item.route" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__link">
      <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </a>
    }
  </nav>
</aside>
