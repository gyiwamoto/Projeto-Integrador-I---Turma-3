<section class="cadastro-page">
  <div class="cadastro-page__header">
    <div>
      <p class="cadastro-page__eyebrow">Administracao</p>
      <h1>Convenios</h1>
      <p>Cadastre e mantenha os convenios utilizados pela clinica.</p>
    </div>
    <button type="button" class="primary-action" (click)="abrirNovoConvenio()">Novo convenio</button>
  </div>

  <app-filtros [titulo]="'Filtrar convenios'" [campos]="camposFiltro"
    (filtrosChange)="onFiltrosChange($event)"></app-filtros>

  @if (erroMensagem) {
  <p class="feedback feedback--erro">{{ erroMensagem }}</p>
  }

  @if (sucessoMensagem) {
  <p class="feedback feedback--sucesso">{{ sucessoMensagem }}</p>
  }

  <app-tabela [colunas]="colunasTabela" [linhas]="linhasTabelaConvenios" mensagemSemDados="Nenhum convenio cadastrado."
    [carregando]="carregando" mensagemCarregando="Carregando convenios..." [acaoEditar]="acaoEditarConvenio"
    [acaoExcluir]="acaoExcluirConvenio"></app-tabela>
</section>

<app-modal [aberto]="modalConvenioAberto"
  [titulo]="modoFormulario === 'criar' ? 'Novo convenio' : (convenioSelecionado?.nome ?? 'Convenio')"
  descricao="Cadastro de convenio" [modoEdicao]="true" [mostrarBotaoEditar]="false" (fechar)="fecharModalConvenio()"
  (salvar)="salvarConvenio()" (cancelar)="fecharModalConvenio()">
  <form class="cadastro-form" [formGroup]="formConvenio">
    <label>
      <span>Nome</span>
      <input type="text" formControlName="nome" />
    </label>

    <label>
      <span>Status</span>
      <select formControlName="ativo">
        <option [ngValue]="true">Ativo</option>
        <option [ngValue]="false">Inativo</option>
      </select>
    </label>
  </form>
</app-modal>

<app-modal [aberto]="modalExclusaoAberto" titulo="Excluir convenio" descricao="Acao permanente"
  [mostrarBotaoEditar]="false" [mostrarBotaoFechar]="false" (fechar)="fecharModalExclusao()">
  <div class="confirmacao-exclusao">
    <p>
      Tem certeza que deseja excluir
      <strong>{{ convenioSelecionado?.nome }}</strong>?
    </p>

    <div class="confirmacao-exclusao__acoes">
      <button type="button" class="secondary-action" (click)="fecharModalExclusao()" [disabled]="excluindo">
        Cancelar
      </button>
      <button type="button" class="danger-action" (click)="confirmarExclusaoConvenio()" [disabled]="excluindo">
        {{ excluindo ? 'Excluindo...' : 'Excluir convenio' }}
      </button>
    </div>
  </div>
</app-modal>
