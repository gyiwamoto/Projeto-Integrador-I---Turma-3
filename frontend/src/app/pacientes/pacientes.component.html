<div class="page">
  <div class="container">

    <div class="top-bar">
      <button class="back-btn" (click)="voltar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Voltar
      </button>
      <h2 class="titulo">TABELA PACIENTES</h2>
    </div>

    <div class="busca-wrap">
      <svg class="busca-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="busca-input" type="text" placeholder="Buscar por nome, CPF, celular, e-mail..."
        [(ngModel)]="termoBusca" />
      <button class="busca-clear" *ngIf="termoBusca" (click)="termoBusca = ''">✕</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID*</th>
            <th>NOME*</th>
            <th>SOBRENOME</th>
            <th>DATA NASC</th>
            <th>WHATSAPP*</th>
            <th>EMAIL</th>
            <th>ENDEREÇO</th>
            <th>TIPO</th>
            <th>CPF**</th>
            <th>CARTEIRINHA</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of pacientesFiltrados" class="linha-clicavel" (click)="verHistorico(p)">
            <td>{{ p.id }}</td>
            <td>{{ p.nome }}</td>
            <td>{{ p.sobrenome }}</td>
            <td>{{ p.dataNasc }}</td>
            <td>{{ p.whatsapp }}</td>
            <td class="td-email">{{ p.email }}</td>
            <td class="td-endereco">{{ p.endereco }}</td>
            <td>
              <span *ngIf="p.tipo" class="tipo-badge"
                [class.particular]="p.tipo === 'Particular'"
                [class.convenio]="p.tipo === 'Convênio'">
                {{ p.tipo }}
              </span>
            </td>
            <td>{{ p.cpf }}</td>
            <td>{{ p.carteirinha }}</td>
          </tr>
          <tr *ngIf="pacientesFiltrados.length === 0">
            <td colspan="10" class="vazio">Nenhum paciente encontrado.</td>
          </tr>
          <tr *ngFor="let i of linhasVazias" class="linha-vazia">
            <td></td><td></td><td></td><td></td><td></td>
            <td></td><td></td><td></td><td></td><td></td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
