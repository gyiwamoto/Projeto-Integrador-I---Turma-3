<div class="page">
  <div class="card">

    <div class="logo-wrap">
      <img src="logo.png" alt="Sousa Iwamoto" class="logo" />
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="field" [class.error]="cpf.invalid && cpf.touched">
        <label>CPF:</label>
        <input type="text" formControlName="cpf" placeholder="000.000.000-00" />
        <span class="hint" *ngIf="cpf.errors?.['required'] && cpf.touched">Campo obrigatório.</span>
      </div>

      <div class="field" [class.error]="nome.invalid && nome.touched">
        <label>Nome</label>
        <input type="text" formControlName="nome" />
        <span class="hint" *ngIf="nome.errors?.['required'] && nome.touched">Campo obrigatório.</span>
      </div>

      <div class="field">
        <label>Sobrenome</label>
        <input type="text" formControlName="sobrenome" />
      </div>

      <div class="field">
        <label>Celular</label>
        <input type="text" formControlName="celular" placeholder="(00) 00000-0000" />
      </div>

      <div class="field" [class.error]="email.invalid && email.touched">
        <label>email</label>
        <input type="email" formControlName="email" />
        <span class="hint" *ngIf="email.errors?.['email'] && email.touched">E-mail inválido.</span>
      </div>

      <div class="field" [class.error]="plano.invalid && plano.touched">
        <label>carteirinha/particular</label>
        <div class="select-wrap">
          <select formControlName="plano">
            <option value="" disabled selected></option>
            <option value="Convenio">Convênio</option>
            <option value="Particular">Particular</option>
          </select>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <span class="hint" *ngIf="plano.errors?.['required'] && plano.touched">Campo obrigatório.</span>
      </div>

      <div class="error-global" *ngIf="errorMsg()">{{ errorMsg() }}</div>
      <div class="success-global" *ngIf="successMsg()">{{ successMsg() }}</div>

      <div class="actions">
        <button type="submit" class="btn-confirm" [disabled]="loading()">
          <span *ngIf="!loading()">cadastrar</span>
          <span *ngIf="loading()" class="spinner"></span>
        </button>
        <button type="button" class="btn-cancel" (click)="cancelar()">cancela</button>
      </div>

    </form>
  </div>
</div>
